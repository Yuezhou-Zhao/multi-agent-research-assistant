services:
  research-agent:
    # No platform pin: build and run natively for the host arch. On Apple
    # Silicon this is linux/arm64 — pinning linux/amd64 forced an emulated
    # rebuild that re-downloaded every wheel. All deps (torch CPU, faiss,
    # FlagEmbedding) publish arm64 wheels, so native is both faster and
    # avoids the redundant build.
    build: .
    image: multi-agent-research-assistant:latest
    container_name: research-agent
    ports:
      - "8000:8000"   # Chainlit UI
      - "8001:8001"   # FastAPI JSON API
    # API keys come from .env at the repo root. .env is gitignored,
    # so keys never end up in a public artifact.
    env_file:
      - .env
    volumes:
      # FAISS index + parent-child metadata: regenerable via
      # `python -m rag.indexer`, so we volume-mount rather than bake
      # into the image. Persists across
      # container recreation; if the volume is empty (fresh checkout,
      # or user ran `docker compose down -v`), entrypoint.sh rebuilds
      # it once at startup.
      - ./index:/app/index
      # Hugging Face cache: sentence-transformers + FlagEmbedding
      # download bge-small-en-v1.5 (~90MB) and bge-reranker-v2-m3
      # (varies) on first use. Named volume so a `docker compose down`
      # (without -v) preserves them and subsequent runs skip re-download.
      - hf_cache:/hf_cache
    restart: unless-stopped

volumes:
  hf_cache:
