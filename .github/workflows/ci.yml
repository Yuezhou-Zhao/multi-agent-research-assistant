name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # torch CPU wheel is enough for the test suite and much smaller
      # than the default CUDA build; the version matches requirements.lock
      # (and the Dockerfile) so CI tests the same versions that ship.
      - name: Install dependencies
        run: |
          pip install torch==2.12.1 --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt -c requirements.lock

      # The real-encoder integration test loads BAAI/bge-small-en-v1.5
      # (~130 MB) — cache it across runs.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-small-en-v1.5

      # No API keys in CI: the 5 live-LLM integration tests skip themselves
      # (see @pytest.mark.skipif in tests/test_preflight.py and
      # tests/test_supervisor.py); the remaining 110 must pass.
      - name: Run tests
        run: python -m pytest -q
